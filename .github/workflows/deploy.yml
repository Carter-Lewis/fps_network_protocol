name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            protocol/target
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test protocol serialization
        working-directory: protocol
        run: cargo test

      - name: Build server (release)
        working-directory: server
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: game-server
          path: server/target/x86_64-unknown-linux-gnu/release/game-server

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: game-server

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          DOMAIN: ${{ secrets.GAME_DOMAIN }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 400 key.pem

          # Ensure working directory exists
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST \
            "mkdir -p /home/ubuntu/game-server"

          # Write service file locally then SCP — avoids heredoc-at-column-0 YAML issue
          printf '[Unit]\n'                                              > /tmp/game-server.service
          printf 'Description=FPS Game Server (WebTransport + TCP/UDP)\n' >> /tmp/game-server.service
          printf 'After=network.target\n\n'                            >> /tmp/game-server.service
          printf '[Service]\n'                                          >> /tmp/game-server.service
          printf 'Type=simple\n'                                        >> /tmp/game-server.service
          printf 'User=ubuntu\n'                                        >> /tmp/game-server.service
          printf 'WorkingDirectory=/home/ubuntu/game-server\n'         >> /tmp/game-server.service
          printf 'ExecStart=/home/ubuntu/game-server/server\n'         >> /tmp/game-server.service
          printf 'Restart=on-failure\n'                                 >> /tmp/game-server.service
          printf 'RestartSec=5\n\n'                                    >> /tmp/game-server.service
          printf '[Install]\n'                                          >> /tmp/game-server.service
          printf 'WantedBy=multi-user.target\n'                        >> /tmp/game-server.service
          scp -o StrictHostKeyChecking=no -i key.pem \
            /tmp/game-server.service ubuntu@$HOST:/tmp/game-server.service
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST \
            "sudo mv /tmp/game-server.service /etc/systemd/system/game-server.service && sudo systemctl enable game-server"

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST \
            "sudo systemctl stop game-server || true"

          # Upload new binary
          scp -o StrictHostKeyChecking=no -i key.pem \
            game-server \
            ubuntu@$HOST:/home/ubuntu/game-server/server
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST \
            "chmod +x /home/ubuntu/game-server/server"

          # Write DOMAIN into a systemd drop-in so the server finds the cert
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST "
            sudo mkdir -p /etc/systemd/system/game-server.service.d
            printf '[Service]\nEnvironment=DOMAIN=${DOMAIN}\n' | \
              sudo tee /etc/systemd/system/game-server.service.d/domain.conf > /dev/null
            sudo systemctl daemon-reload
          "

          # Certbot renewal hook: restart server when cert auto-renews
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST "
            printf '#!/bin/sh\nsystemctl restart game-server\n' | \
              sudo tee /etc/letsencrypt/renewal-hooks/post/restart-game-server.sh > /dev/null
            sudo chmod +x /etc/letsencrypt/renewal-hooks/post/restart-game-server.sh
          "

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$HOST \
            "sudo systemctl start game-server"

          rm key.pem
