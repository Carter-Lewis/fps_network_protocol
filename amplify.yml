version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    baseDirectory: fps_game
    files:
      - '**/*'
  cache:
    paths: []
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Cross-Origin-Opener-Policy
        value: same-origin
      - key: Cross-Origin-Embedder-Policy
        value: require-corp
